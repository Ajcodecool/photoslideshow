<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Media Admin</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        #media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .media-card {
            background: #242424;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .media-preview {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #000;
        }
        .media-info {
            padding: 10px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .media-name {
            font-size: 12px;
            color: #aaa;
            word-break: break-all;
            margin-bottom: 10px;
        }
        .btn-delete {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-delete:hover {
            background: #b71c1c;
        }
        #loading {
            text-align: center;
            font-size: 18px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Manage Dashboard Media</h1>
    <div id="loading">Loading files...</div>
    <div id="media-grid"></div>

    <script>
        var SUPABASE_URL = 'https://api.croomsconnect.com';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.XaG-6cRHV8WIfTcuFMHhRmPdUiqn_jm15U4vzHrrt6w';
        var BUCKET_NAME = 'slideshow-photos';

        function isVideo(name) {
            return name.match(/\.(mp4|webm|ogg)$/i) !== null;
        }

        function loadMedia() {
            var grid = document.getElementById('media-grid');
            var loading = document.getElementById('loading');
            
            grid.innerHTML = "";
            loading.style.display = "block";

            var url = SUPABASE_URL + "/storage/v1/object/list/" + BUCKET_NAME;
            var xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);
            
            xhr.setRequestHeader("apikey", SUPABASE_KEY);
            xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    loading.style.display = "none";
                    try {
                        var data = JSON.parse(xhr.responseText);
                        var count = 0;

                        for (var i = 0; i < data.length; i++) {
                            var file = data[i];
                            if (file.name && file.name !== ".emptyFolderPlaceholder") {
                                count++;
                                renderCard(file.name);
                            }
                        }

                        if (count === 0) {
                            grid.innerHTML = "<p style='grid-column: 1 / -1; text-align: center;'>Your database is empty.</p>";
                        }
                    } catch(e) {
                        loading.innerText = "Error parsing data.";
                    }
                } else if (xhr.readyState == 4) {
                    loading.innerText = "Failed to load media. Check credentials.";
                }
            };

            var body = JSON.stringify({
                prefix: "",
                limit: 100,
                offset: 0,
                sortBy: { column: "created_at", order: "desc" }
            });
            xhr.send(body);
        }

        function renderCard(fileName) {
            var grid = document.getElementById('media-grid');
            var publicUrl = SUPABASE_URL + "/storage/v1/object/public/" + BUCKET_NAME + "/" + encodeURIComponent(fileName);
            
            var card = document.createElement('div');
            card.className = 'media-card';

            var previewHtml = "";
            if (isVideo(fileName)) {
                previewHtml = '<video class="media-preview" src="' + publicUrl + '#t=1" controls preload="metadata"></video>';
            } else {
                previewHtml = '<img class="media-preview" src="' + publicUrl + '" loading="lazy" alt="Media">';
            }

            // FIX: Passing 'this' directly to deleteMedia avoids all ID/Selector crashing issues
            var safeName = fileName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            var infoDiv = '<div class="media-info">' +
                              '<div class="media-name">' + fileName + '</div>' +
                              '<button class="btn-delete" onclick="deleteMedia(this, \'' + safeName + '\')">Delete File</button>' +
                          '</div>';

            card.innerHTML = previewHtml + infoDiv;
            grid.appendChild(card);
        }

        // FIX: Replaced ID lookup with direct element reference (btnElement)
        function deleteMedia(btnElement, fileName) {
            if (!confirm("Are you sure you want to delete this file permanently? It will disappear from the dashboard on the next cycle.")) {
                return;
            }

            // Grab the parent card directly based on HTML structure (card > infoDiv > button)
            var card = btnElement.parentNode.parentNode;
            btnElement.innerText = "Deleting...";

            var url = SUPABASE_URL + "/storage/v1/object/" + BUCKET_NAME + "/" + encodeURIComponent(fileName);
            var xhr = new XMLHttpRequest();
            xhr.open("DELETE", url, true);
            
            xhr.setRequestHeader("apikey", SUPABASE_KEY);
            xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);

            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        if (card && card.parentNode) {
                            card.parentNode.removeChild(card);
                        }
                    } else {
                        alert("Failed to delete file. It may be locked or permissions are incorrect.");
                        btnElement.innerText = "Delete File";
                    }
                }
            };
            xhr.send();
        }

        window.onload = loadMedia;

    </script>
</body>
</html>
