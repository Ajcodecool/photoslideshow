<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dashboard Pro + Scheduler + Live Chat (Android 6 Safe)</title>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: sans-serif; overflow: hidden;
        }

        #background-container { position: absolute; width: 100%; height: 100%; z-index: 1; cursor: pointer; }

        .photo {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; opacity: 0;
            transition: opacity 2s ease-in-out, transform 45s linear;
            will-change: opacity, transform;
            transform: scale(1.0);
        }

        .active { opacity: 1; }

        @keyframes kenburns {
            from { transform: scale(1.0); }
            to { transform: scale(1.12); }
        }

        @keyframes intenseKenburns {
            from { transform: scale(1.0); }
            to { transform: scale(1.25); }
        }

        #overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 50px; z-index: 10;
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: none; 
        }

        #time { font-size: 100px; font-weight: bold; line-height: 1; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        #date { font-size: 26px; opacity: 0.8; margin-top: 10px; }
        #temp { font-size: 80px; line-height: 1; }
        #condition { font-size: 26px; opacity: 0.8; }

        #night-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 500; display: none;
        }

        #settings-panel {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 450px;
            background: rgba(25, 25, 25, 0.98);
            border: 2px solid #444; border-radius: 20px;
            padding: 25px; z-index: 100;
            display: none; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            background: #333; color: white; border: 1px solid #555;
            border-radius: 10px; font-size: 16px; cursor: pointer;
        }

        .schedule-row {
            display: flex; justify-content: space-between; align-items: center;
            margin: 10px 0; padding: 10px; background: #222; border-radius: 8px;
        }

        input[type="time"], select {
            background: #444; color: white; border: none; padding: 5px; border-radius: 5px;
        }

        /* === CHAT WIDGET STYLES === */
        #chat-widget {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 320px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 16px;
            padding: 20px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-header {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .chat-message {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .chat-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #444;
            border: 2px solid rgba(255,255,255,0.2);
            margin-right: 12px;
        }

        .chat-content {
            display: flex;
            flex-direction: column;
            width: calc(100% - 48px);
        }

        .chat-user {
            font-weight: bold;
            color: #4da6ff;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .chat-text {
            color: #eee;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .chat-text img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="night-overlay" onclick="toggleNightMode(false)"></div>

    <div id="background-container" onclick="toggleSettings()">
        <img id="photo1" class="photo active" src="https://picsum.photos/1280/800" alt="">
        <img id="photo2" class="photo" src="" alt="">
    </div>

    <div id="chat-widget">
        <div class="chat-header">Live Chat</div>
        <div id="chat-messages-container">
            <div style="color: rgba(255,255,255,0.5); font-size: 12px;">Loading messages...</div>
        </div>
    </div>

    <div id="overlay">
        <div>
            <div id="time">00:00</div>
            <div id="date">--</div>
        </div>
        <div id="weather-container">
            <div id="temp">--°</div>
            <div id="condition">Updating...</div>
        </div>
    </div>

    <div id="settings-panel">
        <h3 style="margin: 0 0 15px 0">Frame Control</h3>

        <div class="schedule-row">
            <span>Sleep Time:</span>
            <input type="time" id="sleepTime" value="22:00">
        </div>
        <div class="schedule-row">
            <span>Wake Time:</span>
            <input type="time" id="wakeTime" value="07:00">
        </div>

        <div class="schedule-row">
            <span>Animation Intensity:</span>
            <select id="animationIntensity">
                <option value="normal" selected>Normal</option>
                <option value="intense">Intense</option>
            </select>
        </div>

        <div class="schedule-row">
            <span>Transition Type:</span>
            <select id="transitionType">
                <option value="fade" selected>Fade</option>
                <option value="slide">Slide</option>
                <option value="zoom">Zoom</option>
            </select>
        </div>

        <button class="btn" onclick="updatePhoto(); event.stopPropagation();">Next Photo</button>
        <button class="btn" onclick="toggleNightMode(true); event.stopPropagation();">Manual Night Mode</button>
        <button class="btn" onclick="location.reload(); event.stopPropagation();">Refresh Dashboard</button>
        <button class="btn" onclick="toggleSettings(); event.stopPropagation();">Save & Close</button>
    </div>

    <script>
        // === OLD ANDROID 6 SAFE JAVASCRIPT ===
        // We strictly use 'var' instead of 'let/const' and basic functions instead of arrow functions (=>)

        var LAT = "28.6692", LON = "-81.2068";
        var currentImgIdx = 1;

        // API Credentials
        var PI_URL = 'https://api.croomsconnect.com';
        var PI_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.XaG-6cRHV8WIfTcuFMHhRmPdUiqn_jm15U4vzHrrt6w';
        var chatMessages = [];

        function toggleSettings() {
            var panel = document.getElementById('settings-panel');
            var isHidden = panel.style.display === 'none' || panel.style.display === '';
            panel.style.display = isHidden ? 'block' : 'none';
        }

        function toggleNightMode(forceOn) {
            var night = document.getElementById('night-overlay');
            if (forceOn) {
                night.style.display = 'block';
                document.getElementById('settings-panel').style.display = 'none';
            } else {
                night.style.display = 'none';
            }
        }

        function checkSchedule() {
            var now = new Date();
            var h = now.getHours();
            var m = now.getMinutes();
            var currentTime = h + ":" + (m < 10 ? '0' : '') + m;
            var sleep = document.getElementById('sleepTime').value;
            var wake = document.getElementById('wakeTime').value;

            if (currentTime === sleep) toggleNightMode(true);
            else if (currentTime === wake) toggleNightMode(false);
        }

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes();
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            document.getElementById('time').innerText = h + ':' + m + ' ' + ampm;

            var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('date').innerText = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();

            checkSchedule();
        }

        function updateWeather() {
            var url = "https://api.open-meteo.com/v1/forecast?latitude=" + LAT + "&longitude=" + LON + "&current_weather=true&temperature_unit=fahrenheit";
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var data = JSON.parse(xhr.responseText);
                    var weatherMap = {0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast", 45: "Fog", 51: "Drizzle", 61: "Rain", 71: "Snow", 95: "Storm"};
                    document.getElementById('temp').innerText = Math.round(data.current_weather.temperature) + "°";
                    document.getElementById('condition').innerText = weatherMap[data.current_weather.weathercode] || "Cloudy";
                }
            };
            xhr.send();
        }

        function updatePhoto() {
            var nextImgIdx = currentImgIdx === 1 ? 2 : 1;
            var target = document.getElementById('photo' + nextImgIdx);
            var current = document.getElementById('photo' + currentImgIdx);
            var newSrc = "https://picsum.photos/1280/800?random=" + Math.random();

            var tempImg = new Image();
            tempImg.onload = function() {
                target.src = newSrc;

                var intensity = document.getElementById('animationIntensity').value;
                var transition = document.getElementById('transitionType').value;

                target.style.transition = 'none';
                target.className = 'photo';
                current.className = 'photo';
                var forceReflow = target.offsetWidth; 

                switch (transition) {
                    case 'fade':
                        target.style.transition = 'opacity 2s ease-in-out, transform 45s linear';
                        break;
                    case 'slide':
                        target.style.transition = 'transform 1s ease-in-out, opacity 1s ease-in-out';
                        target.style.transform = 'translateX(100%)';
                        setTimeout(function() { 
                            target.style.transform = 'translateX(0)'; 
                        }, 20);
                        break;
                    case 'zoom':
                        target.style.transition = 'transform 5s ease-in-out, opacity 2s ease-in-out';
                        target.style.transform = 'scale(1.0)';
                        break;
                }

                if (intensity === 'intense') {
                    target.style.animation = 'intenseKenburns 45s linear forwards';
                } else {
                    target.style.animation = 'kenburns 45s linear forwards';
                }

                target.className += ' active';
                currentImgIdx = nextImgIdx;
            };
            tempImg.src = newSrc;
        }

        // === ANDROID 6 COMPATIBLE SUPABASE FETCHING ===
        // We use old-school XMLHttpRequest instead of Fetch or the modern Supabase Client.

        function renderMessages() {
            var container = document.getElementById('chat-messages-container');
            
            if (chatMessages.length === 0) {
                container.innerHTML = '<div style="color: rgba(255,255,255,0.5); font-size: 12px;">No messages yet.</div>';
                return;
            }

            var htmlString = "";
            for (var i = 0; i < chatMessages.length; i++) {
                var msg = chatMessages[i];
                var username = msg.username ? msg.username : 'Unknown User';
                var avatar = msg.avatar_url ? msg.avatar_url : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(username) + '&background=random';
                var text = msg.is_deleted ? '<i>Message deleted</i>' : msg.message;

                htmlString += '<div class="chat-message" id="msg-' + msg.id + '">' +
                                '<img class="chat-avatar" src="' + avatar + '" onerror="this.src=\'https://ui-avatars.com/api/?name=U&background=random\'">' +
                                '<div class="chat-content">' +
                                    '<span class="chat-user">' + username + '</span>' +
                                    '<span class="chat-text">' + text + '</span>' +
                                '</div>' +
                              '</div>';
            }
            
            container.innerHTML = htmlString;
        }

        function fetchChat() {
            // Replaced the block condition so it correctly fetches from your API
            if (!PI_URL) return; 

            var url = PI_URL + "/rest/v1/messages?select=*&order=timestamp.desc&limit=5";
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            
            // Supabase Authentication Headers
            xhr.setRequestHeader("apikey", PI_KEY);
            xhr.setRequestHeader("Authorization", "Bearer " + PI_KEY);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        // Reverse the array so the newest message is at the bottom
                        chatMessages = data.reverse(); 
                        renderMessages();
                    } catch (e) {
                        console.error("Error parsing chat data.");
                    }
                }
            };
            xhr.send();
        }

        // Initialize Everything
        updateClock();
        updateWeather();
        fetchChat(); 
        
        setInterval(updateClock, 1000);
        setInterval(updateWeather, 600000);
        setInterval(updatePhoto, 40000);
        
        // Instead of WebSockets, we poll the REST API every 10 seconds for new messages. 
        // This is MUCH safer for the Rockchip CPU memory limits.
        setInterval(fetchChat, 10000); 

    </script>
</body>
</html>
