<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        #background-container { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .photo {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .active { opacity: 1; }
        #overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 50px; z-index: 10;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        #time { font-size: 100px; font-weight: bold; line-height: 1; }
        #date { font-size: 24px; opacity: 0.8; margin-top: 10px; }
        #weather-container { text-align: right; }
        #temp { font-size: 80px; line-height: 1; }
        #condition { font-size: 24px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="background-container">
        <img id="photo1" class="photo active" src="https://picsum.photos/1280/800" alt="">
        <img id="photo2" class="photo" src="" alt="">
    </div>

    <div id="overlay">
        <div>
            <div id="time">00:00</div>
            <div id="date">--</div>
        </div>
        <div id="weather-container">
            <div id="temp">--°</div>
            <div id="condition">Updating...</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        var LAT = "26.83"; 
        var LON = "-80.12";

        var weatherMap = {
            0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
            45: "Fog", 51: "Drizzle", 61: "Rain", 71: "Snow", 95: "Storm"
        };

        // 1. Fixed Clock (No modern options that might crash old Chrome)
        function updateClock() {
            var now = new Date();
            var h = now.getHours();
            var m = now.getMinutes();
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12;
            h = h ? h : 12; 
            m = m < 10 ? '0' + m : m;
            
            document.getElementById('time').innerText = h + ':' + m + ' ' + ampm;
            
            var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('date').innerText = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
        }

        // 2. Fixed Weather (Using XMLHttpRequest instead of Fetch for older Android)
        function updateWeather() {
            var url = "http://api.open-meteo.com/v1/forecast?latitude=" + LAT + "&longitude=" + LON + "&current_weather=true&temperature_unit=fahrenheit";
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var data = JSON.parse(xhr.responseText);
                    var temp = Math.round(data.current_weather.temperature);
                    var code = data.current_weather.weathercode;
                    document.getElementById('temp').innerText = temp + "°";
                    document.getElementById('condition').innerText = weatherMap[code] || "Cloudy";
                }
            };
            xhr.send();
        }

        // 3. Fixed Photo Switcher
        var currentImgIdx = 1;
        function updatePhoto() {
            var nextImgIdx = currentImgIdx === 1 ? 2 : 1;
            var target = document.getElementById('photo' + nextImgIdx);
            var current = document.getElementById('photo' + currentImgIdx);

            // Use picsum as it's lighter for old frames
            var newSrc = "https://picsum.photos/1280/800?random=" + Math.random();

            var tempImg = new Image();
            tempImg.onload = function() {
                target.src = newSrc;
                target.className = "photo active";
                current.className = "photo";
                currentImgIdx = nextImgIdx;
            };
            tempImg.src = newSrc;
        }

        // Initial Start
        updateClock();
        updateWeather();
        updatePhoto();

        // Intervals
        setInterval(updateClock, 1000);
        setInterval(updateWeather, 600000); // 10 mins
        setInterval(updatePhoto, 30000);    // 30 seconds
    </script>
</body>
</html>
