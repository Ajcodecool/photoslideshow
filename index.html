<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dashboard</title>
    <style>
        /* Essential for older Android WebView performance */
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: 'Roboto', sans-serif; /* Standard on Android 6.0 */
            overflow: hidden;
        }

        #background-container {
            position: absolute; width: 100%; height: 100%;
            z-index: 1;
        }

        .photo {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .active { opacity: 1; }

        #overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 5% 6%; z-index: 10;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        #time-container { line-height: 1; }
        #time { font-size: 100px; font-weight: 300; }
        #date { font-size: 24px; opacity: 0.8; margin-top: 10px; }

        #weather-container { text-align: right; line-height: 1.2; }
        #temp { font-size: 70px; font-weight: 300; }
        #condition { font-size: 24px; text-transform: capitalize; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="background-container">
        <img id="photo1" class="photo active" src="" alt="">
        <img id="photo2" class="photo" src="" alt="">
    </div>

    <div id="overlay">
        <div id="time-container">
            <div id="time">00:00</div>
            <div id="date">Loading Date...</div>
        </div>
        <div id="weather-container">
            <div id="temp">--°</div>
            <div id="condition">Loading Weather</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const LAT = "26.83"; // Replace with your Latitude
        const LON = "-80.12"; // Replace with your Longitude
        const PHOTO_INTERVAL = 60000; // Change photo every 60 seconds
        
        let currentPhotoElement = 1;

        // --- WEATHER CODES (WMO Standard) ---
        const weatherMap = {
            0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
            45: "Fog", 48: "Depositing Rime Fog", 51: "Light Drizzle", 61: "Slight Rain",
            71: "Slight Snow", 95: "Thunderstorm"
        };

        // Update Time and Date
        function updateClock() {
            const now = new Date();
            const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
            const dateOptions = { weekday: 'long', month: 'long', day: 'numeric' };
            
            document.getElementById('time').innerText = now.toLocaleTimeString([], timeOptions).replace(' AM', '').replace(' PM', '');
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, dateOptions);
        }

        // Fetch Weather from Open-Meteo (No Key Needed)
        async function updateWeather() {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&temperature_unit=fahrenheit`;
                const response = await fetch(url);
                const data = await response.json();
                
                const current = data.current_weather;
                document.getElementById('temp').innerText = Math.round(current.temperature) + "°";
                document.getElementById('condition').innerText = weatherMap[current.weathercode] || "Cloudy";
            } catch (err) {
                console.error("Weather failed:", err);
            }
        }

        // Cross-fade to a random photo
        function updatePhoto() {
            const nextPhotoElement = currentPhotoElement === 1 ? 2 : 1;
            const imgTarget = document.getElementById(`photo${nextPhotoElement}`);
            const imgCurrent = document.getElementById(`photo${currentPhotoElement}`);

            // Using Unsplash source - adding a timestamp prevents browser caching
            const newSrc = `https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1280&q=80&sig=${Math.random()}`;

            const tempImg = new Image();
            tempImg.onload = () => {
                imgTarget.src = newSrc;
                imgTarget.classList.add('active');
                imgCurrent.classList.remove('active');
                currentPhotoElement = nextPhotoElement;
            };
            tempImg.src = newSrc;
        }

        // Initial Run
        setInterval(updateClock, 1000);
        setInterval(updateWeather, 900000); // Every 15 minutes
        setInterval(updatePhoto, PHOTO_INTERVAL);

        updateClock();
        updateWeather();
        updatePhoto();
    </script>
</body>
</html>
