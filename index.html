<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dashboard Pro - Fixed Storage</title>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: sans-serif; overflow: hidden;
        }

        #background-container { position: absolute; width: 100%; height: 100%; z-index: 1; cursor: pointer; }

        .photo {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; opacity: 0;
            transition: opacity 2s ease-in-out;
            will-change: opacity, transform;
            transform: scale(1.0);
        }

        .active { opacity: 1; }

        @keyframes kenburns {
            from { transform: scale(1.0); }
            to { transform: scale(1.12); }
        }

        @keyframes intenseKenburns {
            from { transform: scale(1.0); }
            to { transform: scale(1.25); }
        }

        #overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 50px; z-index: 10;
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: none; 
        }

        #time { font-size: 100px; font-weight: bold; line-height: 1; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        #date { font-size: 26px; opacity: 0.8; margin-top: 10px; }
        #temp { font-size: 80px; line-height: 1; }
        #condition { font-size: 26px; opacity: 0.8; }

        #night-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 500; display: none;
        }

        #settings-panel {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 450px;
            background: rgba(25, 25, 25, 0.98);
            border: 2px solid #444; border-radius: 20px;
            padding: 25px; z-index: 100;
            display: none; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            background: #333; color: white; border: 1px solid #555;
            border-radius: 10px; font-size: 16px; cursor: pointer;
        }

        .schedule-row {
            display: flex; justify-content: space-between; align-items: center;
            margin: 10px 0; padding: 10px; background: #222; border-radius: 8px;
        }

        input[type="time"], select {
            background: #444; color: white; border: none; padding: 5px; border-radius: 5px;
        }
        
        input[type="file"] {
            background: #444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;
        }

        #chat-widget {
            position: absolute; top: 40px; right: 40px; width: 320px;
            background: rgba(0, 0, 0, 0.55); border-radius: 16px;
            padding: 20px; z-index: 10; pointer-events: none;
            display: flex; flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header {
            font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.6); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px; margin-bottom: 15px;
        }

        .chat-message { display: flex; align-items: flex-start; margin-bottom: 12px; }
        .chat-avatar { width: 36px; height: 36px; border-radius: 50%; margin-right: 12px; border: 2px solid rgba(255,255,255,0.2); }
        .chat-user { font-weight: bold; color: #4da6ff; font-size: 13px; }
        .chat-text { color: #eee; font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="night-overlay" onclick="toggleNightMode(false)"></div>

    <div id="background-container" onclick="toggleSettings()">
        <img id="photo1" class="photo active" src="" alt="">
        <img id="photo2" class="photo" src="" alt="">
    </div>

    <div id="chat-widget">
        <div class="chat-header">Live Chat</div>
        <div id="chat-messages-container">
            <div style="color: rgba(255,255,255,0.5); font-size: 12px;">Loading...</div>
        </div>
    </div>

    <div id="overlay">
        <div>
            <div id="time">00:00</div>
            <div id="date">--</div>
        </div>
        <div id="weather-container">
            <div id="temp">--°</div>
            <div id="condition">Updating...</div>
        </div>
    </div>

    <div id="settings-panel">
        <h3 style="margin: 0 0 15px 0">Frame Control</h3>
        <button class="btn" onclick="updatePhoto(); event.stopPropagation();">Next Photo</button>
        <div class="schedule-row">
            <span>Sleep:</span> <input type="time" id="sleepTime" value="22:00">
        </div>
        <div class="schedule-row">
            <span>Wake:</span> <input type="time" id="wakeTime" value="07:00">
        </div>
        <button class="btn" onclick="toggleNightMode(true); event.stopPropagation();">Manual Night</button>
        <button class="btn" onclick="location.reload(); event.stopPropagation();">Refresh</button>
        <button class="btn" onclick="toggleSettings(); event.stopPropagation();">Close</button>
    </div>

    <script>
        var LAT = "28.6692", LON = "-81.2068";
        var PI_URL = 'https://api.croomsconnect.com';
        var PI_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.XaG-6cRHV8WIfTcuFMHhRmPdUiqn_jm15U4vzHrrt6w';
        var BUCKET = "slideshow-photos";
        
        var photoList = [];
        var currentImgIdx = 1;

        function toggleSettings() {
            var panel = document.getElementById('settings-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function toggleNightMode(on) {
            document.getElementById('night-overlay').style.display = on ? 'block' : 'none';
        }

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes();
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            document.getElementById('time').innerText = h + ':' + m + ' ' + ampm;
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
            
            // Auto Sleep/Wake
            var currentTime = (now.getHours() < 10 ? '0' : '') + now.getHours() + ":" + (m < 10 ? '0' : '') + m;
            if (currentTime === document.getElementById('sleepTime').value) toggleNightMode(true);
            if (currentTime === document.getElementById('wakeTime').value) toggleNightMode(false);
        }

        function updateWeather() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://api.open-meteo.com/v1/forecast?latitude="+LAT+"&longitude="+LON+"&current_weather=true&temperature_unit=fahrenheit", true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var data = JSON.parse(xhr.responseText);
                    document.getElementById('temp').innerText = Math.round(data.current_weather.temperature) + "°";
                    document.getElementById('condition').innerText = "Clear Sky"; // Simplified for brevity
                }
            };
            xhr.send();
        }

        // === FIXED FETCH PHOTOS (The 400 Fix) ===
        function fetchPhotos() {
            var xhr = new XMLHttpRequest();
            // Pointing to the list endpoint for the specific bucket
            xhr.open("POST", PI_URL + "/storage/v1/object/list/" + BUCKET, true);
            
            // Critical Headers
            xhr.setRequestHeader("apikey", PI_KEY);
            xhr.setRequestHeader("Authorization", "Bearer " + PI_KEY);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        var data = JSON.parse(xhr.responseText);
                        photoList = data;
                        console.log("Photos synced:", photoList.length);
                        if(document.getElementById('photo1').src === "" && photoList.length > 0) updatePhoto();
                    } else {
                        console.error("Storage Error:", xhr.status, xhr.responseText);
                    }
                }
            };
            // Critical Body: Must send at least an empty object for a 200 OK
            xhr.send(JSON.stringify({ "limit": 100, "offset": 0, "sortBy": { "column": "name", "order": "asc" } }));
        }

        function updatePhoto() {
            if (photoList.length === 0) return;

            var nextImgIdx = currentImgIdx === 1 ? 2 : 1;
            var target = document.getElementById('photo' + nextImgIdx);
            var current = document.getElementById('photo' + currentImgIdx);

            var randomFile = photoList[Math.floor(Math.random() * photoList.length)].name;
            // Public URL format for Supabase Storage
            var newSrc = PI_URL + "/storage/v1/object/public/" + BUCKET + "/" + randomFile;

            var tempImg = new Image();
            tempImg.onload = function() {
                target.src = newSrc;
                target.style.animation = 'kenburns 45s linear forwards';
                target.className = 'photo active';
                current.className = 'photo';
                currentImgIdx = nextImgIdx;
            };
            tempImg.src = newSrc;
        }

        function fetchChat() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", PI_URL + "/rest/v1/messages?select=*&order=timestamp.desc&limit=5", true);
            xhr.setRequestHeader("apikey", PI_KEY);
            xhr.setRequestHeader("Authorization", "Bearer " + PI_KEY);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var msgs = JSON.parse(xhr.responseText).reverse();
                    var html = "";
                    for (var i = 0; i < msgs.length; i++) {
                        var avatar = "https://ui-avatars.com/api/?name=" + (msgs[i].username || 'U');
                        html += '<div class="chat-message"><img class="chat-avatar" src="'+avatar+'"><div class="chat-content"><span class="chat-user">'+msgs[i].username+'</span><span class="chat-text">'+msgs[i].message+'</span></div></div>';
                    }
                    document.getElementById('chat-messages-container').innerHTML = html;
                }
            };
            xhr.send();
        }

        // Start
        updateClock();
        updateWeather();
        fetchPhotos();
        fetchChat();

        setInterval(updateClock, 1000);
        setInterval(updatePhoto, 30000);
        setInterval(fetchPhotos, 60000);
        setInterval(fetchChat, 10000);
    </script>
</body>
</html>
