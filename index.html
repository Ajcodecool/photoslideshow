<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dashboard</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #background-image {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            transition: opacity 1s ease-in-out;
        }

        #overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 40px; z-index: 2;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        #time { font-size: 80px; font-weight: bold; }
        #weather { font-size: 30px; text-align: right; }
    </style>
</head>
<body>

    <img id="background-image" src="" alt="Photo">

    <div id="overlay">
        <div id="time">00:00</div>
        <div id="weather">Loading Weather...</div>
    </div>

    <script>
        const API_KEY = 'YOUR_OPENWEATHER_API_KEY';
        const CITY = 'YourCityName';
        const PHOTO_INTERVAL = 30000; // 30 seconds

        // Update Time
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        // Get Weather
        async function updateWeather() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${API_KEY}&units=metric`);
                const data = await response.json();
                document.getElementById('weather').innerHTML = `${data.name}<br>${Math.round(data.main.temp)}°C | ${data.weather[0].main}`;
            } catch (e) {
                console.log("Weather error", e);
            }
        }

        // Change Background Photo
        function updatePhoto() {
            const img = document.getElementById('background-image');
            // Using Unsplash for truly random high-quality photos
            img.src = "https://source.unsplash.com/random/1920x1080?nature,landscape&t=" + new Date().getTime();
        }

        // Run loops
        setInterval(updateTime, 1000);
        setInterval(updateWeather, 600000); // Every 10 mins
        setInterval(updatePhoto, PHOTO_INTERVAL);

        // Initial calls
        updateTime();
        updateWeather();
        updatePhoto();
    </script>
</body>
</html>
