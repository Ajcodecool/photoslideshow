<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dashboard Legacy</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #background-container { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .photo { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.01; -webkit-transform: translate3d(0,0,0); }
        #debug-log { position: absolute; top: 0; left: 0; z-index: 999; background: rgba(0,0,0,0.7); color: #0f0; font-family: monospace; font-size: 11px; width: 100%; max-height: 120px; overflow: hidden; padding: 5px; pointer-events: none; border-bottom: 1px solid #0f0; }
        #overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px; z-index: 10; background: linear-gradient(transparent, rgba(0,0,0,0.8)); display: flex; justify-content: space-between; align-items: flex-end; }
        #time { font-size: 80px; font-weight: bold; }
        #weather-container { text-align: right; }
        #temp { font-size: 60px; }
    </style>
</head>
<body>

    <div id="debug-log">System Booting...</div>

    <div id="background-container">
        <img id="photo1" class="photo" src="" style="opacity: 1;">
        <img id="photo2" class="photo" src="">
    </div>

    <div id="overlay">
        <div>
            <div id="time">00:00</div>
            <div id="date">--</div>
        </div>
        <div id="weather-container">
            <div id="temp">--°</div>
            <div id="condition">--</div>
        </div>
    </div>

    <script>
        // Use ONLY 'var' and 'function' for Android 6 compatibility
        var debugElement = document.getElementById('debug-log');
        function log(m) {
            debugElement.innerHTML = m + "<br>" + debugElement.innerHTML;
            console.log(m);
        }

        var PI_IP = "192.168.0.20"; // Ensure this is correct
        var PHOTO_API = "http://" + PI_IP + ":3001/photos";
        var currentIdx = 1;
        var photos = [];

        function updateClock() {
            var now = new Date();
            var h = now.getHours();
            var m = now.getMinutes();
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('time').innerText = h + ":" + (m < 10 ? '0'+m : m) + " " + ampm;
        }

        function fetchPhotoList() {
            log("Attempting Fetch: " + PHOTO_API);
            var xhr = new XMLHttpRequest();
            
            // Android 6 needs very explicit timeout and error handling
            xhr.timeout = 10000; 
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            photos = JSON.parse(xhr.responseText);
                            log("SUCCESS: Found " + photos.length + " photos");
                            if (photos.length > 0) { startSlideshow(); }
                        } catch(e) {
                            log("JSON ERROR: Could not parse response");
                        }
                    } else {
                        log("NET ERROR: Status " + xhr.status + " (Check Pi Server/CORS)");
                    }
                }
            };

            xhr.onerror = function() {
                log("FATAL: Network Request Blocked or Refused");
            };

            xhr.ontimeout = function() {
                log("TIMEOUT: Pi not responding");
            };

            xhr.open("GET", PHOTO_API, true);
            xhr.send();
        }

        function startSlideshow() {
            updatePhoto();
            setInterval(updatePhoto, 30000);
        }

        function updatePhoto() {
            if (photos.length === 0) return;
            
            var nextIdx = (currentIdx === 1) ? 2 : 1;
            var targetImg = document.getElementById('photo' + nextIdx);
            var currentImg = document.getElementById('photo' + currentIdx);
            
            var randomImg = photos[Math.floor(Math.random() * photos.length)];
            // Cache buster is vital for old WebKit
            var imgUrl = "http://" + PI_IP + ":3001/photos/" + encodeURI(randomImg) + "?t=" + new Date().getTime();
            
            log("Loading Img: " + randomImg.substring(0,10));

            targetImg.onload = function() {
                log("Img Ready. Swapping...");
                
                // Reset target position
                targetImg.style.transition = "none";
                targetImg.style.webkitTransition = "none";
                targetImg.style.opacity = "0.01";
                
                // Force Reflow
                void targetImg.offsetWidth;

                // Execute Transition
                targetImg.style.transition = "opacity 2s ease-in-out";
                targetImg.style.webkitTransition = "opacity 2s ease-in-out";
                targetImg.style.opacity = "1";

                currentImg.style.transition = "opacity 2s ease-in-out";
                currentImg.style.webkitTransition = "opacity 2s ease-in-out";
                currentImg.style.opacity = "0.01";

                currentIdx = nextIdx;
            };

            targetImg.onerror = function() {
                log("Error loading image file");
            };

            targetImg.src = imgUrl;
        }

        // Initialize
        updateClock();
        setInterval(updateClock, 1000);
        
        // Initial Fetch
        fetchPhotoList();
        // Refresh list every 5 minutes
        setInterval(fetchPhotoList, 300000);

    </script>
</body>
</html>
